<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>株式会社翔創</title>

<link rel="stylesheet" href="css/style.css">
</head>

    <body>
        <header>
            <div class="company">
                <h2>
                    株式会社翔創
                </h2>
                <small>
                    代表取締役:鈴鹿武司
                </small>
            </div>
            <nav>
                <a href="#home">HOME</a>
                <a href="#service">SERVICE</a>
                <a href="#about">ABOUT</a>
                <a href="#contact">CONTACT</a>
            </nav>
        </header>
        
        <section class="hero" id="home">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>
                    データで相場を読み解き、<br>
                    リアルエステーとで富を固める
                </h1>
                <p>
                    感覚ではなく、圧倒的なロジックを。<br>
                    一過性の利益ではなく、世代を超える資産形成を。
                </p>
            </div>
        </section>
        
        <section class="service" id="service">
            <h2>
                4つのコア事業
            </h2>
            <div class="cards">
                <div class="card">
                    <img src="images/service/IT.jpg">
                    <h3>IT・データツール</h3>
                    <p>
                        独自のアルゴリズム解析。
                    </p>
                </div>
                <div class="card">
                    <img src="images/service/FX.jpg">
                    <h3>FX教育プログラム</h3>
                    <p>
                        成功するトレーダーを育成。
                    </p>
                </div>
                <div class="card">
                    <img src="images/service/RE.jpg">
                    <h3>不動産投資</h3>
                    <p>
                        安定した資産運用と開発。
                    </p>
                </div>
                <div class="card">
                    <img src="images/service/AM.jpg">
                    <h3>資産管理運用</h3>
                    <p>
                        多発的な運用戦略。
                    </p>
                </div>
            </div>
        </section>
        <section class="about" id="about">
            <div class="about-box">
                <h2>
                    ABOUT
                </h2>
                <p>
                    ここに会社説明を書く。
                </p>
            </div>
        </section>
        <section class="contact" id="contact">
            <h2>
                CONTACT
            </h2>
            <a href="#" class="button">
                CONTACT US
            </a>
        </section>
        <script src="js/main.js"></script>
    </body>
</html>
